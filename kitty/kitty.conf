# Atrium — dedicated Kitty config
# This kitty is NOT Niklas's daily terminal. It's the agent-native workspace.
# Rules here are for density, legibility, and agent affordances — not aesthetic parity.

# ── Identity ───────────────────────────────────────────────────────────────
# WM sees this instance as distinct (class=atrium). --class is passed in argv.
# Session: X11 currently (Pop!_OS GNOME session). Config avoids Wayland-only
# directives (copy_command wl-copy, wayland_titlebar_color) so it works on both.

# Disable shell startup integration messages / extra protocols — faster spawn
linux_display_server x11

# ── Font — dense, text-first, no ligatures ─────────────────────────────────
# FiraCode Nerd Font is present on this machine; JetBrainsMono is not.
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.5
disable_ligatures always
modify_font cell_height 90%

# ── Cursor — brass beam + thick, signals active cognition ──────────────────
cursor               #d89a4a
cursor_shape         beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# ── Window — keep decorations so the user can close/min/max normally ─────
# Earlier v0 hid decorations for density — but on X11 without them there's
# no way to close or resize from the window itself. Show them until we have
# in-Atrium keybind-driven window management.
hide_window_decorations no
window_padding_width    4 6
window_margin_width     0
window_border_width     0
draw_minimal_borders    yes
placement_strategy      center
remember_window_size    yes
initial_window_width    1600
initial_window_height   1000

# ── Tabs — Zellij owns tabs; hide Kitty's tab bar ──────────────────────────
tab_bar_style hidden

# ── Palette: "oxidized copper" — authored identity, not a dark-theme mirror
# Charcoal-umber substrate, brass+copper warmth, bone-white text, restrained
# cool states. Verbatim from ~/Atrium/design/tokens.css (Claude Design 2026-04-19).
background            #0f0c0a
foreground            #e8dcc4
selection_background  #3a2d1a
selection_foreground  #ffffff
background_opacity    1.0

# 16-colour palette (ANSI)
color0  #1a1410
color1  #b85a3a
color2  #8ca05a
color3  #d89a4a
color4  #7a9ab0
color5  #b07a9a
color6  #6aa090
color7  #c9baa0
color8  #4a3d2e
color9  #d87a4a
color10 #a8c070
color11 #f0b860
color12 #98b8d0
color13 #d09ab8
color14 #8ac0b0
color15 #ffffff

# ── Clipboard — X11 + Wayland both handled by kitty's built-ins ───────────
# No explicit copy_command — kitty uses xclip/xsel on X11 and wl-copy on
# Wayland automatically. Setting it to wl-copy silently breaks X11.
copy_on_select          yes
strip_trailing_spaces   smart
clipboard_control       write-clipboard write-primary read-clipboard read-primary

# ── Scrollback — generous, agent may need to re-read output ────────────────
scrollback_lines            100000
scrollback_pager            nvim -u NONE -c 'setlocal buftype=nowrite' -c 'normal G' -
scrollback_pager_history_size 10

# ── Shell + URL handling ───────────────────────────────────────────────────
shell             /bin/zsh
shell_integration enabled
open_url_with     default
url_style         straight
url_color         #61afef
detect_urls       yes

# ── Remote control — agent drives Kitty via socket ─────────────────────────
# Atrium agents can run `kitty @ launch`, `kitty @ set-colors`, etc.
# Note: kitty only expands {kitty_pid}, not %u / $USER / etc. Keep the
# path fixed; Atrium is single-instance per machine so no collision.
allow_remote_control   yes
listen_on              unix:/tmp/atrium-kitty.sock

# ── Bell — silent; status bar conveys state, not sound ─────────────────────
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no

# ── Performance — aggressive; this is a tool, not a screensaver ────────────
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# ── Modkey — use Super as Kitty's leader so Ctrl/Alt are free for Zellij/nvim
kitty_mod super

# Kitty's own key-level actions stay on Super-; everything else passes through.
# Zellij handles splits/tabs inside; Kitty just hosts.
clear_all_shortcuts yes
map kitty_mod+c    copy_to_clipboard
map kitty_mod+v    paste_from_clipboard
map kitty_mod+equal   change_font_size all +1.0
map kitty_mod+minus   change_font_size all -1.0
map kitty_mod+0       change_font_size all 0
map kitty_mod+f11     toggle_fullscreen
map kitty_mod+u       kitten unicode_input
map kitty_mod+escape  kitty_shell window
# Close the Atrium window cleanly (Super+Q, in addition to decorations)
map kitty_mod+q       close_os_window
# Kill-switch: Super+Shift+Esc sends SIGINT to the focused zellij pane
# (aborts long-running commands). Runs in background so UI doesn't block.
map kitty_mod+shift+escape launch --type=background --hold atrium-kill hotkey
# Layout rescue: Super+Shift+R re-adds the agent-v0 tabs to the current
# session if you accidentally closed a tab/pane. Preserves existing work.
map kitty_mod+shift+r      launch --type=background --hold atrium-layout-restore
